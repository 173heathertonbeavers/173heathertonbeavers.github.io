<header>
  <div class="header-inner">
    <h1>173rd Derby (Heatherton) Scout Group</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="beavers.html">Beavers</a>

<section class="welcome contact-section">
  <div class="container">
    <h2>Contact Us</h2>
    <p>Please fill out the form below, and we’ll get back to you as soon as possible.</p>

    <div class="contact-form-wrapper">
      <form action="https://formspree.io/f/YOUR-FORMSPREE-ENDPOINT" method="POST">
        
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="_replyto" placeholder="you@example.com" required>

        <label for="interest">I am interested in</label>
        <select id="interest" name="interest" required>
          <option value="">--Please choose--</option>
          <option value="beavers">Beavers</option>
          <option value="cubs">Cubs</option>
          <option value="scouts">Scouts</option>
          <option value="volunteer">Volunteering</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>

        <button type="submit" class="btn-secondary">Send Message</button>
      </form>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <p>© 2026 173rd Derby (Heatherton) Scout Group</p>
  </div>
</footer>
