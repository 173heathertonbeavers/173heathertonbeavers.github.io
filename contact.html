<head>

<title>Contact - 173rd Derby (Heatherton) Scout Group</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <h1>173rd Derby (Heatherton) Scout Group</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="beavers.html">Beavers</a>
      <a href="cubs.html">Cubs</a>
      <a href="scouts.html">Scouts</a>
      <div class="dropdown">
        <a href="#">Volunteer ▼</a>
        <div class="dropdown-content">
          <a href="volunteer.html#young">Young Leaders</a>
          <a href="volunteer.html#adult">Adults</a>
        </div>
      </div>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="contact-page-section">
  <div class="container">
    <h2>Contact Us</h2>
    <p>Use the form below to get in touch — whether you’re enquiring about Beavers, Cubs, Scouts, or volunteering opportunities.</p>

    <form action="https://formspree.io/f/YOUR-FORMSPREE-ENDPOINT" method="POST" class="contact-form">

      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="_replyto" placeholder="you@example.com" required>

      <label for="interest">I’m interested in</label>
      <select id="interest" name="interest" required>
        <option value="">Select…</option>
        <option value="beavers">Beavers</option>
        <option value="cubs">Cubs</option>
        <option value="scouts">Scouts</option>
        <option value="volunteer">Volunteering</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" placeholder="Write your message here…" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>
</section>

<footer>
  <div class="container">
    <p>© 2026 173rd Derby (Heatherton) Scout Group</p>
  </div>
</footer>

</body>
