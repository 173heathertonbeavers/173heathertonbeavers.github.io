<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="173rd Derby (Heatherton) Scout Group offering Beavers, Cubs and Scouts for young people in Derby.">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scouts - 173rd Derby (Heatherton) Scout Group</title>
<link rel="stylesheet" href="/style/style.css">
</head>
<body>

<div id="header"></div>

<section class="welcome">
  <div class="container">
    <h2 id="page_title"></h2>
<p id="intro_text"></p></div>
</section>

<section class="activities">
  <div class="container">
    <h2>Typical Activities</h2>
    <div class="cards">
      <div class="card"><h3>Adventure & Camping</h3><p>Overnight camps, hiking trips, and outdoor exploration.</p></div>
      <div class="card"><h3>Leadership</h3><p>Lead teams, plan activities, and mentor younger members.</p></div>
      <div class="card"><h3>Community</h3><p>Contribute to local projects and charitable activities.</p></div>
    </div>
  </div>
</section>

<div id="footer"></div>
<script>
fetch('/content/scouts.json')
  .then(res => res.json())
  .then(data => {
    document.getElementById('page_title').innerText = data.page_title;
    document.getElementById('intro_text').innerText = data.intro_text;
 });
</script>
<script src="/style/script.js"></script>
</body>
</html>
