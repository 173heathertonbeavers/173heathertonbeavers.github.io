<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/173-Heatherton-Scouts/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - 173rd Derby (Heatherton) Scout Group</title>
<link rel="stylesheet" href="/173-Heatherton-Scouts/style/style.css">
</head>
<body>
<div id="header"></div>
<section class="contact-page-section">
  <div class="container">
    <h2>Contact Us</h2>
    <p>Use the form below to get in touch — whether you’re enquiring about Beavers, Cubs, Scouts, or volunteering opportunities.</p>

    <form action="https://formspree.io/f/mpqyggvp" method="POST">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name" required>
<input type="hidden" name="_cc" id="recipient">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="_replyto" placeholder="you@example.com" required>

      <label for="interest">I’m interested in</label>
      <select id="interest" name="interest" required>
        <option value="">Select…</option>
        <option value="beavers">Beavers</option>
        <option value="cubs">Cubs</option>
        <option value="scouts">Scouts</option>
        <option value="volunteer">Volunteering</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" placeholder="Write your message here…" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>
</section>

<div id="footer"></div>
<script src="/173-Heatherton-Scouts/style/script.js" defer></script>
<script>
const form = document.querySelector("form");
const dropdown = document.getElementById("interest");
const recipientField = document.getElementById("recipient");

form.addEventListener("submit", function () {
  switch (dropdown.value) {
    case "beavers":
      recipientField.value = "173HeathertonBeavers@gmail.com";
      break;
    case "cubs":
      recipientField.value = "173HeathertonCubs@gmail.com";
      break;
    case "scouts":
      recipientField.value = "173HeathertonScouts@gmail.com";
      break;
    case "volunteer":
      recipientField.value = "173heathertonvolunteering@gmail.com";
      break;
    default:
      recipientField.value = "173HeathertonBeavers@gmail.com";
  }
});
</script>
</body>
</html>
